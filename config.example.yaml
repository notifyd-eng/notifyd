server:
  listen: ":8400"
  read_timeout: 30s
  idle_timeout: 120s
  # api_key: "your-secret-key-here"

store:
  driver: sqlite3
  dsn: /var/lib/notifyd/notifyd.db

retry:
  max_attempts: 5
  initial_wait: 1s
  max_wait: 5m
  multiplier: 2.0

channels:
  email:
    host: smtp.example.com
    port: 587
    username: ""
    password: ""
    from: "notifications@example.com"
    use_tls: true

  slack:
    token: ""
    default_channel: "#notifications"

  webhook:
    timeout: 10s
    max_retries: 3
